<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>LookingIn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --card: #10141c;
      --border: rgba(255,255,255,0.07);
      --green: #3ddc84;
      --red: #ff4e4e;
      --yellow: #ffc107;
      --muted: #5a6a7a;
      --text: #dde6f0;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 1rem 0.7rem;
      border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 0.9rem; font-weight: 700; flex: 1; }
    .header-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
    .reset-btn {
      background: none; border: none; color: var(--muted);
      font-size: 0.68rem; cursor: pointer; padding: 0.2rem 0.4rem;
      border-radius: 6px; transition: color 0.15s;
    }
    .reset-btn:hover { color: var(--red); }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      padding: 0.8rem 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.7rem;
    }
    .stat-num   { font-size: 1.6rem; font-weight: 800; line-height: 1; color: var(--red); letter-spacing: -0.03em; }
    .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }

    /* Tracker list */
    .section-label {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      padding: 0.6rem 0.9rem 0.3rem;
    }
    .tracker-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }
    .tracker-row:hover { background: var(--card); }
    .t-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .t-name { font-size: 0.78rem; font-weight: 600; flex: 1; }
    .t-meta { font-size: 0.68rem; color: var(--muted); text-align: right; line-height: 1.4; }

    /* Recent activity */
    .activity-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .a-company { font-size: 0.72rem; font-weight: 600; color: var(--red); flex-shrink: 0; width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .a-page    { font-size: 0.7rem; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .a-time    { font-size: 0.62rem; color: var(--muted); flex-shrink: 0; }

    /* Footer */
    .footer {
      padding: 0.7rem 0.9rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .full-report-btn {
      flex: 1;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 0.75rem;
      border: none;
      border-radius: 20px;
      padding: 0.45rem 1rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .full-report-btn:hover { opacity: 0.88; }

    .empty {
      padding: 1.2rem 0.9rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .empty strong { color: var(--green); display: block; margin-bottom: 0.3rem; }

    .loading {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="header">
  <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
    <line x1="20" y1="7" x2="20" y2="15" stroke="#3ddc84" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="7" y="15" width="18" height="11" rx="3" fill="#3ddc84"/>
    <circle cx="20" cy="20.5" r="3.5" fill="#080a0f" stroke="#3ddc84" stroke-width="1.2"/>
    <circle cx="20" cy="20.5" r="1.4" fill="#3ddc84"/>
    <circle cx="19.3" cy="19.8" r="0.5" fill="white" opacity="0.8"/>
    <circle cx="11" cy="20.5" r="1.2" fill="#ff4e4e"/>
    <path d="M25 17.5 L32 14 L32 27 L25 23.5 Z" fill="#3ddc84"/>
    <rect x="17" y="5" width="6" height="3" rx="1.5" fill="#3ddc84"/>
  </svg>
  <div>
    <div class="header-title">LookingIn</div>
    <div class="header-sub" id="dateRange">Last 30 days</div>
  </div>
  <button class="reset-btn" id="resetBtn" title="Reset all data">Reset</button>
</div>

<div id="content">
  <div class="loading">Loading…</div>
</div>

<div class="footer">
  <button class="full-report-btn" id="reportBtn">View full report →</button>
</div>

<script src="popup.js"></script>
</body>
</html>
